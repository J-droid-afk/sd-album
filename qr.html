<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>微信扫码进入SD相册</title>
<style>
  body { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; background:#fff; font-family:sans-serif; }
  img { width:300px; height:300px; }
  p { font-size:18px; color:#333; margin:20px 0 8px; }
  code { background:#f5f5f5; padding:6px 16px; border-radius:8px; font-size:16px; }
</style></head>
<body>
  <h2>微信扫一扫进入SD相册</h2>
  <img id="qr" src="" alt="QR">
  <p>或复制链接在浏览器打开</p>
  <code>https://linyangjiang39-debug.github.io/sd-album</code>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
  <script>
    QRCode.toDataURL('https://linyangjiang39-debug.github.io/sd-album', {width:400,margin:2}, function(err,url){
      document.getElementById('qr').src=url;
    });
  </script>
</body>
</html>
