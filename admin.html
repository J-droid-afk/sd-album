<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SD 相册 - 管理后台</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "PingFang SC","Microsoft YaHei",sans-serif; background: #fdf2ee; color: #4a3f3c; padding: 12px; max-width: 480px; margin: 0 auto; }
    h2 { text-align: center; font-size: 20px; padding: 16px 0; color: #c49480; }
    .card { background: #fffdfb; border-radius: 14px; padding: 14px; margin-bottom: 12px; box-shadow: 0 1px 8px rgba(0,0,0,0.04); }
    input, select { width: 100%; height: 38px; padding: 0 12px; border: 1px solid #f0ddd6; border-radius: 10px; font-size: 15px; margin-bottom: 8px; background: #fef9f6; color: #4a3f3c; }
    input:focus { outline: none; border-color: #e8a598; }
    button { border: none; border-radius: 20px; padding: 10px 20px; font-size: 14px; cursor: pointer; }
    .btn-primary { background: #e8a598; color: #fff; width: 100%; }
    .btn-danger { background: #e88; color: #fff; }
    .btn-sm { padding: 6px 14px; font-size: 12px; }
    .employee-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f5eae4; }
    .employee-row:last-child { border-bottom: none; }
    .employee-info { flex: 1; }
    .employee-info .id { font-weight: 600; font-size: 15px; }
    .employee-info .detail { font-size: 12px; color: #999; }
    .employee-actions { display: flex; gap: 6px; }
    .hidden { display: none; }
    .status { text-align: center; padding: 8px; font-size: 13px; color: #6b5e5a; }
    .status.success { color: #4caf50; }
    .status.error { color: #e88; }
    .label { font-size: 13px; color: #999; margin-bottom: 2px; }
    .logout { text-align: right; margin-bottom: 8px; }
    .logout a { font-size: 13px; color: #c4b5ad; text-decoration: none; }
    .photo-preview { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; margin-right: 10px; }
    .flex-row { display: flex; align-items: center; }
    .badge { display: inline-block; background: #f5eae4; color: #8b7a73; padding: 2px 8px; border-radius: 10px; font-size: 12px; margin-right: 4px; }
  </style>
</head>
<body>

  <!-- 登录 -->
  <div id="loginPage">
    <h2>SD 相册管理</h2>
    <div class="card">
      <div class="label">管理密码</div>
      <input id="pwdInput" type="password" placeholder="请输入管理密码">
      <div class="label" style="margin-top:8px;">GitHub Token</div>
      <input id="tokenInput" placeholder="首次使用需填写，之后自动保存">
      <div style="font-size:11px;color:#c4b5ad;margin-bottom:8px;">
        获取方式：<a href="#" onclick="window.open('https://github.com/settings/tokens/new?scopes=repo&description=sd-album-admin')" style="color:#e8a598;">点此创建token</a>，直接点底部Generate token，复制粘贴到这里
      </div>
      <button class="btn-primary" onclick="login()">进入管理</button>
    </div>
  </div>

  <!-- 管理面板 -->
  <div id="adminPage" class="hidden">
    <div class="logout"><a href="#" onclick="logout()">退出</a></div>
    <h2>员工管理</h2>

    <div id="statusMsg" class="status hidden"></div>

    <!-- 员工列表 -->
    <div id="employeeList" class="card"></div>

    <!-- 添加 / 编辑表单 -->
    <div class="card">
      <div id="formTitle" class="label" style="font-weight:600;font-size:15px;margin-bottom:10px;">添加员工</div>
      <div class="label">工号</div>
      <input id="jobNoInput" placeholder="如 001">
      <div class="label">微信</div>
      <input id="wechatInput" placeholder="微信号（选填）">
      <div class="label">电话</div>
      <input id="phoneInput" placeholder="手机号（选填）">
      <div class="label">照片</div>
      <input id="photoInput" type="file" accept="image/*">
      <div class="flex-row" style="margin:8px 0;">
        <img id="photoPreview" class="photo-preview hidden" src="" alt="预览">
      </div>
      <input id="editId" type="hidden" value="">
      <button class="btn-primary" onclick="saveEmployee()" id="saveBtn">添加员工</button>
      <button class="btn-primary hidden" onclick="cancelEdit()" id="cancelBtn" style="background:#ccc;margin-top:6px;">取消编辑</button>
    </div>

    <!-- 同步状态 -->
    <div class="card" style="text-align:center;">
      <span style="font-size:13px;color:#999;">数据实时同步到云端</span>
    </div>
  </div>

  <script src="./admin.js"></script>
</body>
</html>
